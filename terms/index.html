<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WasteLess Terms of Use</title>
  <meta name="robots" content="index,follow">
  <meta http-equiv="refresh" content="0; url=/fr/terms/">
  <script>
    (function () {
      var langs = navigator.languages || [navigator.language || "fr"];
      var first = (langs[0] || "fr").toLowerCase();
      var target = first.indexOf("fr") === 0 ? "/fr/terms/" : "/en/terms/";
      window.location.replace(target);
    })();
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      background: linear-gradient(140deg, #f4ecdf, #eef4ec 60%, #edf5f3);
      color: #22302f;
    }
    .box {
      border: 1px solid #d7d3cb;
      background: #fffdf9;
      border-radius: 14px;
      padding: 18px 20px;
      max-width: 560px;
      text-align: center;
    }
    a { color: #1f6b5a; }
  </style>
</head>
<body>
  <div class="box">
    <p>Redirecting to the appropriate language...</p>
    <p>
      <a href="/fr/terms/">Français</a>
      |
      <a href="/en/terms/">English</a>
    </p>
  </div>
</body>
</html>
